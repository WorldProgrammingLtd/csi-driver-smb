{{- if .Values.linux.enabled}}
kind: DaemonSet
apiVersion: apps/v1
metadata:
  name: csi-smb-node
  namespace: {{ .Release.Namespace }}
{{ include "smb.labels" . | indent 2 }}
spec:
  selector:
    matchLabels:
      app: csi-smb-node
  template:
    metadata:
{{ include "smb.labels" . | indent 6 }}
        app: csi-smb-node
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      nodeSelector:
        kubernetes.io/os: linux
      priorityClassName: system-node-critical
      tolerations:
        - operator: "Exists"
      {{- include "smb.pullSecrets" . | indent 6 }}
      containers:
        - name: liveness-probe
          volumeMounts:
            - mountPath: /csi
              name: socket-dir
          image: "{{ .Values.image.livenessProbe.repository }}:{{ .Values.image.livenessProbe.tag }}"
          args:
            - --csi-address=/csi/csi.sock
            - --probe-timeout=3s
            - --health-port=29643
            - --v=2
          imagePullPolicy: {{ .Values.image.livenessProbe.pullPolicy }}
          resources:
            limits:
              cpu: 100m
              memory: 100Mi
            requests:
              cpu: 10m
              memory: 20Mi
        - name: node-driver-registrar
          image: "{{ .Values.image.nodeDriverRegistrar.repository }}:{{ .Values.image.nodeDriverRegistrar.tag }}"
          args:
            - --csi-address=$(ADDRESS)
            - --kubelet-registration-path=$(DRIVER_REG_SOCK_PATH)
            - --v=2
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "rm -rf /registration/smb.csi.k8s.io-reg.sock /csi/csi.sock"]
          env:
            - name: ADDRESS
              value: /csi/csi.sock
            - name: DRIVER_REG_SOCK_PATH
              value: {{ .Values.kubelet.linuxPath }}/plugins/smb.csi.k8s.io/csi.sock
          imagePullPolicy: {{ .Values.image.nodeDriverRegistrar.pullPolicy }}
          volumeMounts:
            - name: socket-dir
              mountPath: /csi
            - name: registration-dir
              mountPath: /registration
          resources:
            limits:
              cpu: 100m
              memory: 100Mi
            requests:
              cpu: 10m
              memory: 20Mi
        - name: smb
          image: "{{ .Values.image.smb.repository }}:{{ .Values.image.smb.tag }}"
          imagePullPolicy: {{ .Values.image.smb.pullPolicy }}
          args:
            - "--v={{ .Values.node.logLevel }}"
            - "--endpoint=$(CSI_ENDPOINT)"
            - "--nodeid=$(KUBE_NODE_NAME)"
            - "--metrics-address=0.0.0.0:{{ .Values.node.metricsPort }}"
          ports:
            - containerPort: 29643
              name: healthz
              protocol: TCP
            - containerPort: {{ .Values.node.metricsPort }}
              name: metrics
              protocol: TCP
          livenessProbe:
            failureThreshold: 5
            httpGet:
              path: /healthz
              port: healthz
            initialDelaySeconds: 30
            timeoutSeconds: 10
            periodSeconds: 30
          env:
            - name: CSI_ENDPOINT
              value: unix:///csi/csi.sock
            - name: KUBE_NODE_NAME
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: spec.nodeName
          securityContext:
            privileged: true
          volumeMounts:
            - mountPath: /csi
              name: socket-dir
            - mountPath: {{ .Values.kubelet.linuxPath }}/
              mountPropagation: Bidirectional
              name: mountpoint-dir
{{- if .Values.kerberos.enabled }}
            - mountPath: /etc/krb5.conf
              name: krb5-conf
              subPath: krb5.conf
            - mountPath: /var/krb5/ccache
              name: krb5-cache
{{- end }}
          resources:
            limits:
              cpu: 200m
              memory: 200Mi
            requests:
              cpu: 10m
              memory: 20Mi
{{- if .Values.kerberos.enabled }}
        - name: krb5
          image: "{{ .Values.kerberos.image.repository }}:{{ .Values.kerberos.image.tag }}"
          imagePullPolicy: {{ .Values.kerberos.image.pullPolicy }}
          env:
            - name: KRB5_PRINCIPAL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.kerberos.credentials }}
                  key: principal
          volumeMounts:
            - mountPath: /etc/krb5.conf
              name: krb5-conf
              subPath: krb5.conf
            - mountPath: /var/krb5/smb/krb5.keytab
              name: krb5-keytab
              subPath: krb5.keytab
            - mountPath: /var/krb5/ccache
              name: krb5-cache
          resources:
            limits:
              cpu: 200m
              memory: 200Mi
            requests:
              cpu: 10m
              memory: 20Mi
{{- end }}
      volumes:
        - hostPath:
            path: {{ .Values.kubelet.linuxPath }}/plugins/smb.csi.k8s.io
            type: DirectoryOrCreate
          name: socket-dir
        - hostPath:
            path: {{ .Values.kubelet.linuxPath }}/
            type: DirectoryOrCreate
          name: mountpoint-dir
        - hostPath:
            path: {{ .Values.kubelet.linuxPath }}/plugins_registry/
            type: DirectoryOrCreate
          name: registration-dir
{{- if .Values.kerberos.enabled }}
        - name: krb5-cache
          emptyDir:
        - name: krb5-conf
          configMap:
            name: {{ .Values.kerberos.config }}
            items:
              - key: krb5.conf
                path: krb5.conf
                mode: 0644
        - name: krb5-keytab
          secret:
            secretName: {{ .Values.kerberos.credentials }}
            items:
              - key: krb5.keytab
                path: krb5.keytab
                mode: 0600
{{- end }}
{{- end -}}
